name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.3.1'

    - name: Generate Debug Keystore (for Debug builds)
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Decode Release Keystore (for Production builds)
      if: ${{ secrets.RELEASE_KEYSTORE != '' }}
      run: |
        echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > my-upload-key.jks

    - name: Build with Gradle
      run: |
        if [ "${{ secrets.RELEASE_KEYSTORE }}" != "" ]; then
          echo "Building signed Release APK..."
          gradle assembleRelease
        else
          echo "No release secrets found, building Debug APK instead..."
          gradle assembleDebug
        fi
      env:
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEYSTORE_PATH: my-upload-key.jks
