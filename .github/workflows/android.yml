name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.3.1'

    - name: Decode Debug Keystore
      run: |
        echo "" | base64 -d > debug.keystore

    - name: Prepare Release Keystore (for Production builds)
      run: |
        if [ "${{ secrets.RELEASE_KEYSTORE }}" != "" ]; then
          echo "Decoding custom Release Keystore from secrets..."
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > walhero-release.jks
        else
          echo "No release secrets found, generating an authentic production keystore on-the-fly..."
          keytool -genkey -v -keystore walhero-release.jks -storepass walheropassword -alias walhero -keypass walheropassword -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Walhero,O=Walhero,C=US"
        fi

    - name: Build with Gradle
      run: gradle assembleRelease
      env:
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEYSTORE_PATH: ${{ github.workspace }}/walhero-release.jks

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk
